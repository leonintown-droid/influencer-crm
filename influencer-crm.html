<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>红人营销 CRM · Influencer Marketing CRM</title>
<style>
:root{
  --bg:#f8f9fc; --bg2:#ffffff; --bg3:#f0f3f8; --ink:#1a1f36; --muted:#697386;
  --rule:#e4e7f0; --accent:#5b7cff; --accent2:#0ec4a3; --warn:#ff9f1c; --danger:#ff5757;
  --radius:16px; --radius-sm:10px; --shadow:0 8px 28px rgba(26,31,54,.12);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#d4dae6;border-radius:8px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:#b9c2d4;background-clip:padding-box}
::-webkit-scrollbar-track{background:transparent}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* ===== Layout ===== */
.app{display:flex;min-height:100vh}
.sidebar{width:236px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--rule);padding:22px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 20px;border-bottom:1px solid var(--rule);margin-bottom:16px}
.brand .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:18px;box-shadow:0 4px 12px rgba(91,124,255,.3)}
.brand .t{font-weight:700;font-size:15px;line-height:1.2}
.brand .t small{display:block;color:var(--muted);font-weight:400;font-size:11px}
.nav{display:flex;flex-direction:column;gap:3px;flex:1}
.nav-sec{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:14px 12px 6px;opacity:.7}
.nav button{display:flex;align-items:center;gap:11px;padding:10px 12px;border:none;background:transparent;color:var(--muted);border-radius:var(--radius-sm);font-size:13.5px;font-weight:600;text-align:left;transition:.18s cubic-bezier(.4,0,.2,1);position:relative;--na:var(--accent)}
.nav button:hover{background:color-mix(in srgb,var(--na) 10%,transparent);color:var(--na)}
.nav button:hover .ico{color:var(--na)}
.nav button.active{background:color-mix(in srgb,var(--na) 16%,transparent);color:var(--na)}
.nav button.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--na);border-radius:0 3px 3px 0}
.nav button.active .ico{color:var(--na)}
.nav .ico{width:18px;height:18px;flex-shrink:0;transition:.18s}
.side-foot{font-size:11px;color:var(--muted);padding:10px 8px;border-top:1px solid var(--rule)}
.side-foot button{background:var(--bg3);border:1px solid var(--rule);color:var(--muted);border-radius:8px;padding:7px 9px;font-size:11px;margin-top:8px;width:100%;transition:.15s}
.side-foot button:hover{color:var(--ink);border-color:var(--accent)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 28px;border-bottom:1px solid var(--rule);background:rgba(255,255,255,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:20}
.topbar-title{min-width:0;flex:1 1 auto;overflow:hidden}
.topbar h1{font-size:20px;font-weight:800;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .sub{color:var(--muted);font-size:12px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{display:flex;align-items:center;gap:10px;flex:0 0 auto;flex-wrap:nowrap}
.topbar-actions{display:flex;gap:10px;align-items:center;flex-shrink:0}
.topbar-right .btn,.topbar-right button{white-space:nowrap;flex-shrink:0}
.content{padding:26px 28px 60px;flex:1;max-width:1480px;width:100%}
.view{display:none;animation:fade .35s cubic-bezier(.4,0,.2,1)}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--rule);background:var(--bg2);color:var(--ink);font-size:13px;font-weight:600;transition:.18s cubic-bezier(.4,0,.2,1)}
.btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px rgba(91,124,255,.12)}
.btn:active{transform:translateY(0)}
.btn.primary{background:linear-gradient(135deg,var(--accent),#4665ff);border:none;color:#fff;box-shadow:0 4px 14px rgba(91,124,255,.32)}
.btn.primary:hover{filter:brightness(1.06);color:#fff;box-shadow:0 6px 18px rgba(91,124,255,.42)}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.danger{color:var(--danger);border-color:rgba(255,87,87,.4);background:var(--bg2)}
.btn.danger:hover{background:rgba(255,87,87,.10);border-color:var(--danger);color:var(--danger)}
.icon-btn{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border-radius:9px;border:1px solid var(--rule);background:var(--bg2);color:var(--muted);transition:.18s}
.icon-btn:hover{color:var(--accent);border-color:var(--accent);transform:translateY(-1px)}

/* ===== Cards / Stats ===== */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);padding:20px 22px;position:relative;overflow:hidden;transition:.2s cubic-bezier(.4,0,.2,1);--sc:var(--accent)}
.stat::before{content:"";position:absolute;left:0;top:0;height:100%;width:4px;background:var(--sc);opacity:.9}
.stat:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:transparent}
.stat::after{content:"";position:absolute;right:-24px;top:-24px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--sc) 16%,transparent),transparent 70%)}
.stat .label{color:var(--muted);font-size:12px;font-weight:600;letter-spacing:.02em;display:flex;align-items:center;gap:7px}
.stat .label .si{width:26px;height:26px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;background:color-mix(in srgb,var(--sc) 16%,transparent)}
.stat .num{font-size:32px;font-weight:800;margin-top:10px;line-height:1;letter-spacing:-.02em;color:var(--sc)}
.stat .delta{font-size:12px;color:var(--accent2);margin-top:9px;font-weight:600}
.stat .delta.flat{color:var(--muted)}

.panel{background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);padding:22px;margin-bottom:20px}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
.panel-head h2{font-size:15px;font-weight:700}
.panel-head .hint{color:var(--muted);font-size:12px}
.chart-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:20px}
.chart-box{background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);padding:20px;transition:.2s}
.chart-box:hover{box-shadow:var(--shadow)}
.chart-box h3{font-size:14px;font-weight:700;margin-bottom:6px}
.chart-box .csub{color:var(--muted);font-size:12px;margin-bottom:8px}
.chart{width:100%;min-height:280px}

/* ===== Toolbar ===== */
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;padding:10px 12px 10px 36px;background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius-sm);color:var(--ink);font-size:13px}
.search input:focus{outline:none;border-color:var(--accent)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted)}
select.filter{padding:9px 12px;background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius-sm);color:var(--ink);font-size:13px}
select.filter:focus{outline:none;border-color:var(--accent)}
.seg{display:inline-flex;background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius-sm);overflow:hidden}
.seg button{padding:8px 14px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600}
.seg button.active{background:var(--bg3);color:var(--ink)}

/* ===== Region secondary menu (二级菜单) ===== */
.region-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--rule)}
.region-bar .rb-title{font-size:12px;font-weight:700;color:var(--muted);margin-right:4px}
.region-tab{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border:1px solid var(--rule);background:var(--bg2);color:var(--muted);border-radius:20px;font-size:12px;font-weight:600;transition:.15s}
.region-tab:hover{border-color:var(--accent);color:var(--ink)}
.region-tab.active{background:linear-gradient(135deg,var(--accent),#2f54e0);border-color:transparent;color:#fff;box-shadow:0 4px 12px rgba(59,99,246,.25)}
.region-tab .rb-n{font-size:11px;padding:1px 7px;border-radius:10px;background:var(--bg3);color:var(--muted)}
.region-tab.active .rb-n{background:rgba(255,255,255,.25);color:#fff}
/* region-tab 多彩：不同位置的标签 hover/active 呈现不同主题色 */
.region-bar .region-tab:nth-of-type(5n+1){--rc:#5b7cff}
.region-bar .region-tab:nth-of-type(5n+2){--rc:#0ec4a3}
.region-bar .region-tab:nth-of-type(5n+3){--rc:#ff9f1c}
.region-bar .region-tab:nth-of-type(5n+4){--rc:#9d5cff}
.region-bar .region-tab:nth-of-type(5n+5){--rc:#ff6b8a}
.region-bar .region-tab{--rc:var(--accent)}
.region-bar .region-tab:hover{border-color:var(--rc);color:var(--rc)}
.region-bar .region-tab.active{background:linear-gradient(135deg,var(--rc),color-mix(in srgb,var(--rc) 70%,#000 12%));box-shadow:0 4px 12px color-mix(in srgb,var(--rc) 35%,transparent)}
.rb-group{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-weight:600;cursor:pointer}
.rb-group input{accent-color:var(--accent)}
/* 顶部红人归属切换 全部红人 / 我的红人 */
.scope-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px}
.scope-tab{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:1px solid var(--rule);background:var(--bg2);color:var(--muted);border-radius:12px;font-size:14px;font-weight:700;transition:.15s;cursor:pointer}
.scope-tab:hover{border-color:var(--accent);color:var(--ink)}
.scope-tab.active{background:linear-gradient(135deg,var(--accent),#2f54e0);border-color:transparent;color:#fff;box-shadow:0 6px 16px rgba(59,99,246,.3)}
.scope-tab .rb-n{font-size:12px;padding:2px 9px;border-radius:11px;background:var(--bg3);color:var(--muted);font-weight:700}
.scope-tab.active .rb-n{background:rgba(255,255,255,.25);color:#fff}
.region-group{margin-bottom:22px}
.region-group-head{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:800;color:var(--ink);margin:0 0 12px;padding:8px 12px;background:linear-gradient(90deg,rgba(59,99,246,.08),transparent);border-left:3px solid var(--accent);border-radius:0 8px 8px 0}
.region-group-head .rg-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.region-group-head .rg-count{margin-left:auto;font-size:12px;font-weight:600;color:var(--muted)}

/* ===== Tier chip (四级量级) ===== */
.tier-chip{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;white-space:nowrap}
.tier-chip.t-micro{background:#eef0f4;color:#5b6376}
.tier-chip.t-midtier{background:#e7edfe;color:#2a4bd0}
.tier-chip.t-macro{background:#fdf0dc;color:#b5710a}
.tier-chip.t-tier1{background:#dcf6ee;color:#0a8c66}

/* ===== T0-T3 红人量级 chip ===== */
.tlevel-chip{display:inline-block;font-size:10px;font-weight:800;padding:1px 7px;border-radius:5px;vertical-align:middle;letter-spacing:.3px}
.tlevel-chip.tl-t0{background:#7c3aed;color:#fff}
.tlevel-chip.tl-t1{background:#2a4bd0;color:#fff}
.tlevel-chip.tl-t2{background:#0a8c66;color:#fff}
.tlevel-chip.tl-t3{background:#8a92a6;color:#fff}
.out-pill .link-mini{background:none;border:none;color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;padding:0}
.out-pill .link-mini:hover{text-decoration:underline}

/* ===== 视频产出 Outputs ===== */
.out-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
.out-card{background:var(--bg2);border:1px solid var(--rule);border-radius:14px;padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow)}
.out-card .oc-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.out-card .oc-title{font-size:15px;font-weight:800;color:var(--ink)}
.out-card .oc-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.out-card .oc-meta .chip-camp{background:#e7edfe;color:#2a4bd0;padding:1px 8px;border-radius:10px;font-weight:700}
.stage-track{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stage-box{border:1px solid var(--rule);border-radius:10px;padding:10px 12px;background:var(--bg)}
.stage-box .sb-h{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;color:var(--ink);margin-bottom:6px}
.stage-box .sb-state{font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px}
.sb-state.done{background:#dcf6ee;color:#0a8c66}.sb-state.empty{background:#eef0f4;color:#8a92a6}
.stage-box .sb-src{font-size:12px;color:var(--accent);word-break:break-all}
.stage-box .sb-ai{margin-top:7px;font-size:11px;line-height:1.55;color:var(--muted);background:linear-gradient(90deg,rgba(124,58,237,.06),transparent);border-left:2px solid #7c3aed;padding:6px 8px;border-radius:0 6px 6px 0}
.stage-box .sb-ai b{color:#7c3aed}
.review-box{border:1px solid var(--rule);border-radius:10px;padding:11px 13px;background:var(--bg);margin-bottom:12px;font-size:13px;line-height:1.55}
.review-box .rb-h{font-weight:700;color:var(--ink);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.review-tag{font-size:10px;font-weight:700;padding:1px 8px;border-radius:8px}
.review-tag.approved{background:#dcf6ee;color:#0a8c66}.review-tag.revise{background:#fdf0dc;color:#b5710a}.review-tag.pending{background:#eef0f4;color:#8a92a6}
.metrics-bar{display:flex;flex-wrap:wrap;gap:14px;align-items:center;border-top:1px dashed var(--rule);padding-top:12px;margin-top:4px}
.metric{display:flex;flex-direction:column;min-width:74px}
.metric .mv{font-size:17px;font-weight:800;color:var(--ink)}
.metric .ml{font-size:10px;color:var(--muted);margin-top:1px}
.metric.live .mv{color:var(--accent)}
.pub-link{font-size:12px;color:var(--accent);word-break:break-all;flex:1;min-width:120px}
.btn-refresh{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--rule);color:var(--ink);font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;cursor:pointer;transition:.15s}
.btn-refresh:hover{border-color:var(--accent);color:var(--accent)}
.btn-refresh.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.inf-out-list{margin-top:8px}
.inf-out-item{border:1px solid var(--rule);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--bg)}
.inf-out-item .ioi-h{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ink)}
.inf-out-item .ioi-sub{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}

/* ===== Influencer cards ===== */
.inf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.inf-card{background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);padding:20px;transition:.2s cubic-bezier(.4,0,.2,1);cursor:pointer;position:relative;overflow:hidden}
.inf-card::before{content:"";position:absolute;left:0;top:0;width:100%;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:.2s}
.inf-card:hover{border-color:transparent;transform:translateY(-4px);box-shadow:var(--shadow)}
.inf-card:hover::before{opacity:1}
.inf-card .ic-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.avatar{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:18px;flex-shrink:0;overflow:hidden;box-shadow:0 3px 8px rgba(91,124,255,.2)}
.avatar.has-img{background:#e9eef5}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
.avatar.avatar-lg{width:64px;height:64px;font-size:26px;border-radius:14px}
.avatar-field .avatar-row{display:flex;gap:14px;align-items:flex-start}
.avatar-field .avatar-preview .avatar{width:64px;height:64px;font-size:26px;border-radius:14px}
.avatar-field .avatar-ctrl{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.avatar-field .avatar-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn.sm{padding:5px 10px;font-size:12px}
.inf-card .ic-name{font-weight:700;font-size:15px}
.inf-card .ic-handle{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:6px;margin-top:2px}
.inf-card .ic-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}
.inf-card .ic-stats .s .v{font-weight:700;font-size:16px}
.inf-card .ic-stats .s .l{color:var(--muted);font-size:11px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--bg3);color:var(--muted);font-weight:600}
.tag.v{background:#e7edfe;color:#2a4bd0}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700}
.b-prospect{background:#eef0f4;color:#5b6376}
.b-contacted{background:#e7edfe;color:#2a4bd0}
.b-negotiating{background:#fdf0dc;color:#b5710a}
.b-active{background:#dcf6ee;color:#0a8c66}
.b-paused{background:#fbf3d8;color:#9a7b12}
.b-rejected{background:#fde4e5;color:#c5363b}
.inf-card .ic-foot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--rule)}
/* 请求3：全部红人卡片底部 PIC 负责人 / 转入我的库 */
.inf-card .ic-pic{margin-top:10px;display:flex;justify-content:flex-end;align-items:center;min-height:28px}
.pic-owned{font-size:12px;font-weight:700;color:#3b6cff;display:inline-flex;align-items:center;gap:6px;background:#eef3ff;padding:4px 12px;border-radius:999px}
.pic-me{font-size:10px;font-weight:700;color:#fff;background:#1a9d5a;padding:1px 7px;border-radius:999px}
.pic-claim{white-space:nowrap}
/* 寻找新的红人卡片：双按钮操作区 */
.lib-acts{display:inline-flex;gap:8px;align-items:center}
.platform-chip{font-size:11px;color:var(--muted);display:inline-flex;align-items:center;gap:5px}

/* ===== Table ===== */
.table-wrap{overflow-x:auto;overflow-y:auto;max-height:640px;border:1px solid var(--rule);border-radius:var(--radius);background:var(--bg2)}
table{width:100%;border-collapse:collapse;min-width:880px}
th{text-align:left;padding:13px 14px;font-size:12px;color:var(--muted);font-weight:700;border-bottom:1px solid var(--rule);position:sticky;top:0;background:var(--bg2);z-index:2;white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--rule);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
.row-name{display:flex;align-items:center;gap:10px}
.row-name .avatar{width:34px;height:34px;font-size:14px;border-radius:9px}
.muted{color:var(--muted)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .big{font-size:42px;margin-bottom:12px;opacity:.5}

/* ===== Progress ===== */
.progress{height:7px;background:var(--bg3);border-radius:10px;overflow:hidden}
.progress>span{display:block;height:100%;border-radius:10px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s}
.prog-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}

/* ===== Campaign ===== */
.camp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
.camp-card{background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);padding:20px;cursor:pointer;transition:.18s}
.camp-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.camp-card .ch{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.camp-card .cn{font-weight:700;font-size:16px}
.camp-card .cmeta{color:var(--muted);font-size:12px;margin-top:3px}
.camp-card .cstats{display:flex;gap:18px;margin:16px 0 12px}
.camp-card .cstats .v{font-weight:700;font-size:18px}
.camp-card .cstats .l{color:var(--muted);font-size:11px}
.avatars{display:flex;margin-top:12px}
.avatars .avatar{width:30px;height:30px;font-size:12px;border:2px solid var(--bg2);margin-left:-8px;border-radius:8px}
.avatars .avatar:first-child{margin-left:0}
.avatars .more{width:30px;height:30px;border-radius:8px;background:var(--bg3);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--bg2);margin-left:-8px}

/* stage pipeline */
.pipeline{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px}
.stage-pill{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--rule);color:var(--muted);font-weight:600}
.stage-pill.done{background:#dcf6ee;color:#0a8c66;border-color:transparent}
.stage-pill.current{background:#e7edfe;color:#2a4bd0;border-color:transparent}

/* member row in campaign detail */
.member-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--rule)}
.member-row:last-child{border-bottom:none}
.member-row .mname{font-weight:600;font-size:14px}
.member-row .mhandle{color:var(--muted);font-size:12px}
.stage-select{padding:7px 10px;background:var(--bg3);border:1px solid var(--rule);border-radius:8px;color:var(--ink);font-size:12px}
.stage-select:focus{outline:none;border-color:var(--accent)}

/* ===== Modal ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-overlay.open{display:flex;animation:fade .2s}
.modal{background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal.lg{max-width:860px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--rule);position:sticky;top:0;background:var(--bg2);z-index:3}
.modal-head h3{font-size:17px;font-weight:700}
.modal-body{padding:24px}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--rule);position:sticky;bottom:0;background:var(--bg2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;font-weight:600;color:var(--muted)}
.field label .req{color:var(--danger)}
.field input,.field select,.field textarea{padding:10px 12px;background:var(--bg);border:1px solid var(--rule);border-radius:8px;color:var(--ink);font-size:13px;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;min-height:70px}
.chk-group{display:flex;flex-wrap:wrap;gap:8px}
.chk{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:var(--bg);border:1px solid var(--rule);border-radius:20px;font-size:12px;cursor:pointer;user-select:none}
.chk input{display:none}
.chk.on{background:#e7edfe;border-color:var(--accent);color:#2a4bd0}

/* detail */
.detail-head{display:flex;gap:16px;align-items:center;margin-bottom:20px}
.detail-head .avatar{width:64px;height:64px;font-size:26px;border-radius:14px}
.detail-head h3{font-size:22px}
.kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin:18px 0}
.kv .k{color:var(--muted);font-size:11px;font-weight:600}
.kv .vv{font-size:14px;font-weight:600;margin-top:3px;word-break:break-word}

/* picker list */
.picker{max-height:340px;overflow-y:auto;border:1px solid var(--rule);border-radius:10px}
.picker-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--rule);cursor:pointer}
.picker-item:last-child{border-bottom:none}
.picker-item:hover{background:var(--bg3)}
.picker-item.sel{background:#eef3fe}
.picker-item .pcheck{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--rule);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.picker-item.sel .pcheck{background:var(--accent);border-color:var(--accent)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--rule);color:var(--ink);padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.3s;display:flex;align-items:center;gap:9px}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{border-color:var(--accent2)}
.toast .ti{color:var(--accent2)}

@media(max-width:1180px){
  .topbar .sub{display:none}
  .topbar h1{font-size:18px}
  .au-name,.au-role{max-width:120px;overflow:hidden;text-overflow:ellipsis}
}
@media(max-width:900px){
  .chart-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .sidebar{width:64px;padding:18px 8px}
  .brand .t,.nav button span,.nav-sec,.side-foot{display:none}
  .nav button{justify-content:center;padding:12px}
  .content,.topbar{padding-left:16px;padding-right:16px}
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">i</div>
      <div class="t">红人营销 CRM<small>Influencer Marketing</small></div>
    </div>
    <nav class="nav" id="nav">
      <button data-view="dashboard" class="active" style="--na:#5b7cff"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg><span>数据看板</span></button>
      <div class="nav-sec">红人 Influencers</div>

      <button data-view="library" style="--na:#9d5cff"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg><span>寻找新的红人</span></button>
      <div class="nav-sec">媒体 Media</div>
      <button data-view="media" style="--na:#0ec4a3"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M8 4v5"/></svg><span>RimeLynx媒体库</span></button>
      <button data-view="media-find" style="--na:#12b3c9"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg><span>寻找新的媒体</span></button>
      <div class="nav-sec">运营 Operations</div>
      <button data-view="campaigns" style="--na:#ff9f1c"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg><span>Campaign 活动</span></button>
      <button data-view="outputs" style="--na:#ff6b8a"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M10 8l4 2.5L10 13V8z" fill="currentColor"/><path d="M7 21h10"/></svg><span>视频产出</span></button>
    </nav>
    <div class="side-foot">
      <div>数据保存在本地浏览器</div>
      <button id="exportBtn">⬇ 导出数据 JSON</button>
      <button id="importBtn">⬆ 导入数据 JSON</button>
      <button id="resetBtn">↺ 重置示例数据</button>
      <input type="file" id="importFile" accept="application/json" style="display:none">
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">
        <h1 id="pageTitle">数据看板</h1>
        <div class="sub" id="pageSub">红人营销整体概览与合作进度</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-actions" id="topActions"></div>
        <div id="exportHost"></div>
        <div id="notifyHost" style="position:relative"></div>
      </div>
    </div>
    <div class="content">
      <section id="view-dashboard" class="view active"></section>
      <section id="view-influencers" class="view"></section>
      <section id="view-library" class="view"></section>
      <section id="view-media" class="view"></section>
      <section id="view-media-find" class="view"></section>

</div>
